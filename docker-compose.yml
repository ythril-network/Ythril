services:
  ythril:
    image: ghcr.io/ythril-network/ythril:latest
    container_name: ythril
    restart: unless-stopped
    ports:
      - "${YTHRIL_PORT:-3200}:3200"
    volumes:
      # Config and secrets — keep outside image, mode 0600 enforced at startup
      - ./config:/config
      # Persistent data: uploaded files, etc.
      - ythril-data:/data
    environment:
      CONFIG_PATH: /config/config.json
      DATA_ROOT: /data
      NODE_ENV: production
      YTHRIL_LOCAL_AGENT_ENABLED: ${YTHRIL_LOCAL_AGENT_ENABLED:-}
      YTHRIL_LOCAL_AGENT_URL: ${YTHRIL_LOCAL_AGENT_URL:-http://localhost:38123}
      YTHRIL_LOCAL_AGENT_TOKEN: ${YTHRIL_LOCAL_AGENT_TOKEN:-}
      # Pass DEBUG=1 from the host shell to enable verbose logging:
      #   DEBUG=1 docker compose up
      DEBUG: ${DEBUG:-}
      # If you supply MONGO_URI to point at an external database, set this flag
      # to prevent API-driven migration (POST /api/admin/data/migrate):
      #   YTHRIL_MONGO_INFRA_MANAGED: "true"
    depends_on:
      ythril-mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3200/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - ythril-internal

  ythril-mongo:
    # mongodb/mongodb-atlas-local includes mongot — required for $vectorSearch
    image: mongodb/mongodb-atlas-local:latest
    container_name: ythril-mongo
    # Pin hostname so the replica-set config remains valid across container restarts.
    # Without this, each `docker compose down && up` gets a new random hostname,
    # causing "Our replica set config is invalid or we are not a member of it".
    hostname: ythril-mongo
    restart: unless-stopped
    logging:
      driver: "none"
    volumes:
      - ythril-mongo-data:/data/db
      - ythril-mongo-configdb:/data/configdb
    healthcheck:
      # Wait for the replica set to elect a primary (not just mongod accepting connections)
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({replSetGetStatus:1}).myState===1 ? 1 : quit(1)"]
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 40s
    networks:
      - ythril-internal

volumes:
  ythril-data:
  ythril-mongo-data:
  ythril-mongo-configdb:

networks:
  ythril-internal:
    driver: bridge
    internal: false   # set true to isolate; open for external embedding endpoint access
