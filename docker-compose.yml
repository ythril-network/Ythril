services:
  ythril:
    build: .
    container_name: ythril
    restart: unless-stopped
    ports:
      - "3200:3200"
    volumes:
      # Config and secrets — keep outside image, mode 0600 enforced at startup
      - ./config:/config
      # Persistent data: files + MongoDB brain
      - ythril-data:/data
    environment:
      CONFIG_PATH: /config/config.json
      DATA_ROOT: /data
      MONGO_URI: mongodb://ythril-mongo:27017/?directConnection=true
      NODE_ENV: production
    depends_on:
      ythril-mongo:
        condition: service_healthy
    networks:
      - ythril-internal

  ythril-mongo:
    # mongodb/mongodb-atlas-local includes mongot — required for $vectorSearch
    image: mongodb/mongodb-atlas-local:latest
    container_name: ythril-mongo
    restart: unless-stopped
    volumes:
      - ythril-mongo-data:/data/db
      # Persist /data/configdb so the replica-set keyfile survives container restarts
      - ythril-mongo-configdb:/data/configdb
    healthcheck:
      # Wait for the replica set to elect a primary (not just mongod accepting connections)
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({replSetGetStatus:1}).myState===1 ? 1 : quit(1)"]
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 40s
    networks:
      - ythril-internal

volumes:
  ythril-data:
  ythril-mongo-data:
  ythril-mongo-configdb:

networks:
  ythril-internal:
    driver: bridge
    internal: false   # set true to isolate; open for external embedding endpoint access
