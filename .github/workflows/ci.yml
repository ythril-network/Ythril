name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build test stack
        run: docker compose -p ythril-test -f testing/docker-compose.test.yml build
        # Single build (all services in one pass) is fine on CI — no VS Code to crash.

      - name: Start test containers
        run: |
          # Ensure config bind-mount dirs are writable by the node user (uid 1000) inside the container
          chmod 777 testing/sync/configs/a testing/sync/configs/b testing/sync/configs/c
          docker compose -p ythril-test -f testing/docker-compose.test.yml up -d --wait --wait-timeout 300
          node testing/sync/setup.js

      - name: Run all tests
        run: npm run test:all:core

      - name: Tear down containers
        if: always()
        run: docker compose -p ythril-test -f testing/docker-compose.test.yml down -v --remove-orphans
